version: "3.9"

# ──────────────────────────────────────────────────────
#  AI-Powered Monitoring Platform  –  docker-compose.yml
# ──────────────────────────────────────────────────────

services:

  # ── MySQL ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: monitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: monitoring
      MYSQL_USER: monitor
      MYSQL_PASSWORD: monitor123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umonitor", "-pmonitor123"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: monitor-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── ML Service ────────────────────────────────────────
  ml-service:
    build: ./ml-service
    container_name: monitor-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ml-models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── API Gateway ───────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: monitor-api
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: monitor
      MYSQL_PASS: monitor123
      MYSQL_DB: monitoring
      ML_SERVICE_URL: http://ml-service:8001
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Data Producer ─────────────────────────────────────
  producer:
    build: ./producer
    container_name: monitor-producer
    restart: unless-stopped
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
    depends_on:
      api-gateway:
        condition: service_healthy

  # ── Nginx (reverse proxy + dashboard serving) ─────────
  nginx:
    image: nginx:alpine
    container_name: monitor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway

  # ── Prometheus ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: monitor-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  # ── Grafana ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: monitor-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning

volumes:
  mysql-data:
  redis-data:
  ml-models:
  prometheus-data:
  grafana-data:
